<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta
      name="description"
      content="An interactive poem letter shaped as a cinematic mobile website."
    />
    <title>For Olivia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Outfit:wght@300;400;500;600&family=Parisienne&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <canvas id="star-canvas" aria-hidden="true"></canvas>
    <div class="bg-glow bg-glow-a" aria-hidden="true"></div>
    <div class="bg-glow bg-glow-b" aria-hidden="true"></div>
    <div class="grain-overlay" aria-hidden="true"></div>

    <main id="app" class="app-shell">
      <section class="panel experience" id="experience" aria-live="polite">
        <article class="scene-shell" id="scene-shell">
          <p class="eyebrow" id="scene-eyebrow">something special for you</p>
          <h1 id="scene-title">For Olivia</h1>
          <p class="scene-subtitle" id="scene-subtitle">Tap anywhere to begin</p>

          <ul class="scene-lines" id="scene-lines"></ul>

          <figure class="photo-stage" id="photo-stage" aria-label="A photo of us together" hidden>
            <div class="photo-layer photo-layer-back"></div>
            <img src="US.jpeg" alt="A black and white portrait of us together." class="photo-main" />
            <div class="photo-layer photo-layer-front"></div>
          </figure>

          <p class="photo-note" id="photo-note" hidden>
            This is where my time slows down: right here, with you.
          </p>

          <p id="closing-lines" hidden></p>
          <p class="closing-epilogue" id="closing-epilogue" hidden></p>
        </article>

        <p class="tap-hint" id="tap-hint">Tap anywhere</p>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
